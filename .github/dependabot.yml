version: 2
updates:
  # Python dependencies (oa-cli)
  - package-ecosystem: "pip"
    directory: "/oa-cli"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "oa-cli"
    reviewers:
      - "ImpertioStudio"

  # npm/pnpm dependencies (packages/)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "canvas"
    reviewers:
      - "ImpertioStudio"
    ignore:
      # Avoid major version bumps for React ecosystem
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci-cd"
