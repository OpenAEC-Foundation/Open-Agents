name: Bug Report
description: Report a bug in Open-Agents
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Dank voor het melden van een bug. Vul het formulier zo compleet mogelijk in.

  - type: textarea
    id: description
    attributes:
      label: Beschrijving
      description: Beschrijf de bug kort en bondig
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Verwacht gedrag
      description: Wat had er moeten gebeuren?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Werkelijk gedrag
      description: Wat gebeurde er in plaats daarvan?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Stappen om te reproduceren
      description: Hoe kunnen we dit reproduceren?
      value: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Welk onderdeel van Open-Agents betreft het?
      options:
        - oa-cli (CLI orchestrator)
        - oa-cli (TUI dashboard)
        - oa-cli (Pipeline)
        - oa-cli (Web UI / Command Centre)
        - Visual Canvas (frontend)
        - Visual Canvas (backend)
        - VS Code Extension
        - Frappe App
        - Agent Library
        - CI/CD
        - Overig
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Besturingssysteem
      options:
        - Linux
        - macOS
        - Windows (WSL2)
        - Windows (native)
        - Overig

  - type: input
    id: python_version
    attributes:
      label: Python versie (voor oa-cli bugs)
      placeholder: "bijv. 3.11.8"

  - type: input
    id: node_version
    attributes:
      label: Node.js versie (voor canvas bugs)
      placeholder: "bijv. 20.11.0"

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Logs, screenshots, configuratie, etc.
