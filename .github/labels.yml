# Open-Agents GitHub Labels
# Apply with: gh label import .github/labels.yml
# Or use the GitHub CLI: gh api repos/{owner}/{repo}/labels

- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "triage"
  color: "e4e669"
  description: "Needs triage / investigation"

- name: "invalid"
  color: "e4e4e4"
  description: "This doesn't seem right"

